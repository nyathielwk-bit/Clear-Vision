<body>

  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Button, IconButton } = window.AureliaDesignSystem_df5d1c;
    const Arrow = () => <span style={{fontFamily:'serif'}}>&rarr;</span>;
    const Heart = () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.5-1.5 3-3.3 3-5.5A4.5 4.5 0 0 0 12 5 4.5 4.5 0 0 0 2 8.5c0 2.2 1.5 4 3 5.5l7 7Z"/></svg>);
    const Bag = () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>);

    function Demo() {
      return (
        <div className="stack">
          <div className="row">
            <span className="lbl">Variant</span>
            <Button variant="primary">Get a quote</Button>
            <Button variant="accent">Book a free call</Button>
            <Button variant="secondary">See packages</Button>
            <Button variant="ghost">Learn more</Button>
            <Button variant="link" trailingIcon={<Arrow/>}>All services</Button>

          <div className="row">

            <Button size="sm">Small</Button>
            <Button size="md">Medium</Button>
            <Button variant="accent" size="lg" leadingIcon={<Bag/>}>Start your project</Button>
            <Button disabled>Disabled</Button>

            <span className="lbl">Icon</span>

            <IconButton label="Like" variant="outline"><Heart/></IconButton>
            <IconButton label="Menu" variant="solid"><Bag/></IconButton>
            <IconButton label="Menu" variant="solid" round><Bag/></IconButton>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
