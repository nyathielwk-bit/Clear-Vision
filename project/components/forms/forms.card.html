<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); padding: 26px 30px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
  .col { display: flex; flex-direction: column; gap: 16px; }
  .lbl { font: var(--type-eyebrow); letter-spacing: var(--tracking-wider); text-transform: uppercase; color: var(--text-subtle); }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Input, Checkbox, Switch } = window.AureliaDesignSystem_df5d1c;
    const Search = () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>);

    function Demo() {
      return (
        <div className="grid">
          <div className="col">
            <span className="lbl">Inputs</span>
            <Input label="Work email" type="email" placeholder="you@business.com" hint="We reply within one business day." />
            <Input label="Search services" leadingIcon={<Search/>} placeholder="Search services…" />
            <Input label="Business name" optional defaultValue="Jo" error="Please enter your business name." />
          </div>
          <div className="col">
            <span className="lbl">Choice</span>
            <Checkbox label="Email me project updates" defaultChecked />
            <Checkbox label="Add SEO setup" description="Optimize for Google from launch (+$300)." />
            <Switch label="Send me a copy of my brief" defaultChecked />
            <Switch label="Rush delivery" />
            <Switch label="Unavailable" disabled />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
</body>
</html>
