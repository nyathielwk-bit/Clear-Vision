<!-- @dsCard group="Colors" viewport="700x150" name="Status" subtitle="Success, warning & error — restrained, accessible" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface); padding: 22px 24px; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .item { border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; }
  .bar { padding: 11px 13px; font: var(--type-label); display: flex; align-items: center; justify-content: space-between; }
  .dot { width: 9px; height: 9px; border-radius: 999px; }
  .foot { padding: 9px 13px; display: flex; flex-direction: column; gap: 1px; }
  .name { font: var(--type-caption); color: var(--text-muted); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item">
      <div class="bar" style="background:var(--success-bg); color:var(--success)">Success <span class="dot" style="background:var(--success)"></span></div>
      <div class="foot"><span class="name">--success / --success-bg</span><span class="hex">#4E7A57 · #E2EDE4</span></div>
    </div>
    <div class="item">
      <div class="bar" style="background:var(--warning-bg); color:var(--gold-700)">Warning <span class="dot" style="background:var(--warning)"></span></div>
      <div class="foot"><span class="name">--warning / --warning-bg</span><span class="hex">#C88B3A · #F6EBD6</span></div>
    </div>
    <div class="item">
      <div class="bar" style="background:var(--error-bg); color:var(--error)">Error <span class="dot" style="background:var(--error)"></span></div>
      <div class="foot"><span class="name">--error / --error-bg</span><span class="hex">#B4493C · #F6E2DE</span></div>
    </div>
  </div>
</body>
</html>
