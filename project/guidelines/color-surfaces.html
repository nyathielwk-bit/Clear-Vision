<!-- @dsCard group="Colors" viewport="700x172" name="Surfaces & Text" subtitle="Semantic aliases used in product code" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface); padding: 22px 24px; display:flex; gap: 22px; }
  .col { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .swrow { display: flex; align-items: center; gap: 10px; }
  .chip { width: 34px; height: 34px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); flex: none; }
  .tk { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  .lbl { font: var(--type-eyebrow); letter-spacing: var(--tracking-widest); text-transform: uppercase; color: var(--text-muted); margin-bottom: 2px; }
  .tline { font-size: 15px; }
</style>
</head>
<body>
  <div class="col">
    <span class="lbl">Surfaces</span>
    <div class="swrow"><span class="chip" style="background:var(--background)"></span><span class="tk">--background</span></div>
    <div class="swrow"><span class="chip" style="background:var(--surface)"></span><span class="tk">--surface</span></div>
    <div class="swrow"><span class="chip" style="background:var(--surface-alt)"></span><span class="tk">--surface-alt</span></div>
    <div class="swrow"><span class="chip" style="background:var(--surface-inverse)"></span><span class="tk">--surface-inverse</span></div>
  </div>
  <div class="col">
    <span class="lbl">Text on background</span>
    <div class="tline" style="color:var(--text-primary); font-weight:600">Primary &middot; <span class="tk">--text-primary</span></div>
    <div class="tline" style="color:var(--text-secondary)">Secondary &middot; <span class="tk">--text-secondary</span></div>
    <div class="tline" style="color:var(--text-muted)">Muted &middot; <span class="tk">--text-muted</span></div>
    <div class="tline" style="color:var(--gold-700)">Accent &middot; <span class="tk">--gold-700</span></div>
  </div>
</body>
</html>
