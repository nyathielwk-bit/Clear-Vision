<!-- @dsCard group="Type" viewport="700x150" name="Type Scale" subtitle="Major-third ramp, 11 → 84px" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); padding: 26px 32px; }
  .scale { display:flex; align-items:baseline; gap: 18px; flex-wrap: wrap; }
  .step { display:flex; flex-direction:column; gap:2px; align-items:flex-start; }
  .glyph { font-family: var(--font-display); color: var(--text-heading); line-height: 1; }
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--text-subtle); }
  .tk { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="scale">
    <div class="step"><span class="glyph" style="font-size:11px">Aa</span><span class="px">11</span><span class="tk">2xs</span></div>
    <div class="step"><span class="glyph" style="font-size:14px">Aa</span><span class="px">14</span><span class="tk">sm</span></div>
    <div class="step"><span class="glyph" style="font-size:16px">Aa</span><span class="px">16</span><span class="tk">base</span></div>
    <div class="step"><span class="glyph" style="font-size:22px">Aa</span><span class="px">22</span><span class="tk">lg</span></div>
    <div class="step"><span class="glyph" style="font-size:28px">Aa</span><span class="px">28</span><span class="tk">xl</span></div>
    <div class="step"><span class="glyph" style="font-size:36px">Aa</span><span class="px">36</span><span class="tk">2xl</span></div>
    <div class="step"><span class="glyph" style="font-size:48px">Aa</span><span class="px">48</span><span class="tk">3xl</span></div>
    <div class="step"><span class="glyph" style="font-size:64px">Aa</span><span class="px">64</span><span class="tk">4xl</span></div>
  </div>
</body>
</html>
