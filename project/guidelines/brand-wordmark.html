<!-- @dsCard group="Brand" viewport="700x210" name="Wordmark" subtitle="Clearframe Studio, framed — Playfair + spaced caps" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface); padding: 0; display:grid; grid-template-columns: 1fr 1fr; }
  .panel { display:flex; align-items:center; justify-content:center; padding: 36px; min-height: 210px; }
  .dark { background: var(--navy-800); }
  .lockup { display:flex; flex-direction:column; align-items:center; gap: 9px; padding: 18px 26px; position: relative; }
  /* the "clear frame" device: thin corner brackets */
  .lockup::before, .lockup::after { content:""; position:absolute; width: 20px; height: 20px; }
  .lockup::before { left: 0; top: 0; border-left: 1.5px solid var(--frame); border-top: 1.5px solid var(--frame); }
  .lockup::after { right: 0; bottom: 0; border-right: 1.5px solid var(--frame); border-bottom: 1.5px solid var(--frame); }
  .word { font-family: var(--font-display); font-weight: 500; font-size: 33px; letter-spacing: 0.01em; line-height: 1; }
  .sub { font-family: var(--font-sans); font-size: 10px; font-weight: 600; letter-spacing: 0.42em; text-indent: 0.42em; text-transform: uppercase; }
  .light { --frame: var(--gold-500); }
  .light .word { color: var(--navy-800); }
  .light .sub { color: var(--text-secondary); }
  .dark { --frame: var(--gold-500); }
  .dark .word { color: #fff; }
  .dark .sub { color: var(--gold-300); }
</style>
</head>
<body>
  <div class="panel light">
    <div class="lockup"><div class="word">Clearframe</div><div class="sub">Studio</div></div>
  </div>
  <div class="panel dark">
    <div class="lockup"><div class="word">Clearframe</div><div class="sub">Studio</div></div>
  </div>
</body>
</html>
