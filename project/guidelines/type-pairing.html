<!-- @dsCard group="Type" viewport="700x250" name="The Pairing" subtitle="Playfair Display headlines over Inter text" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface); padding: 30px 32px; }
  .eyebrow { font: var(--type-eyebrow); letter-spacing: var(--tracking-widest); text-transform: uppercase; color: var(--text-accent); }
  h1 { font-family: var(--font-display); font-weight: 400; font-size: 46px; line-height: 1.08; letter-spacing: var(--tracking-tighter); margin: 12px 0 6px; }
  h1 em { font-style: italic; }
  p { font: var(--type-lead); color: var(--text-muted); max-width: 52ch; margin-top: 14px; }
</style>
</head>
<body>
  <span class="eyebrow">Clearframe Studio</span>
  <h1>Websites that <em>look credible</em> from day one</h1>
  <p>Clearframe pairs Playfair Display headlines with Inter for everything functional — premium character up top, clear utility below.</p>
</body>
</html>
