<!-- @dsCard group="Colors" viewport="700x186" name="Neutrals — Warm Stone" subtitle="Off-white backgrounds, borders & secondary text" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface); padding: 22px 24px; }
  .ramp { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; }
  .sw { display: flex; flex-direction: column; gap: 7px; }
  .chip { height: 64px; border-radius: var(--radius-sm); border: 1px solid var(--border); }
  .name { font: var(--type-caption); color: var(--text-muted); letter-spacing: var(--tracking-wide); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
  .meta { display: flex; flex-direction: column; gap: 1px; }
</style>
</head>
<body>
  <div class="ramp">
    <div class="sw"><div class="chip" style="background:var(--stone-0)"></div><div class="meta"><span class="name">0</span><span class="hex">#FFFFFF</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--stone-50)"></div><div class="meta"><span class="name">50</span><span class="hex">#FAF8F4</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--stone-100)"></div><div class="meta"><span class="name">100</span><span class="hex">#F7F5F1</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--stone-150)"></div><div class="meta"><span class="name">150</span><span class="hex">#F1EEE7</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--stone-200)"></div><div class="meta"><span class="name">200</span><span class="hex">#E8E3DA</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--stone-300)"></div><div class="meta"><span class="name">300</span><span class="hex">#D8D2C6</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--stone-400)"></div><div class="meta"><span class="name">400</span><span class="hex">#B7AF9F</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--stone-500)"></div><div class="meta"><span class="name">500</span><span class="hex">#8C8576</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--stone-600)"></div><div class="meta"><span class="name">600</span><span class="hex">#6B6557</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--stone-700)"></div><div class="meta"><span class="name">700</span><span class="hex">#4D483D</span></div></div>
  </div>
</body>
</html>
