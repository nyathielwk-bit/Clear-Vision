<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation" subtitle="Soft, warm umber-tinted shadows" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-raised); padding: 30px 32px; display:flex; gap: 26px; align-items:center; }
  .item { display:flex; flex-direction:column; align-items:center; gap:12px; }
  .box { width: 92px; height: 64px; background: var(--surface-card); border-radius: var(--radius-md); }
  .tk { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="tk">xs</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="tk">sm</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="tk">md</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="tk">lg</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="tk">xl</span></div>
</body>
</html>
