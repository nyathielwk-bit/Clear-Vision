<!-- @dsCard group="Type" viewport="700x300" name="Display — Playfair" subtitle="Editorial display scale, regular & italic" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); padding: 26px 32px; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 7px 0; border-bottom: 1px solid var(--border-subtle); }
  .row:last-child { border-bottom: none; }
  .spec { font-family: var(--font-display); color: var(--text-heading); }
  .tag { margin-left: auto; font-family: var(--font-mono); font-size: 11px; color: var(--text-subtle); white-space: nowrap; }
</style>
</head>
<body>
  <div class="row"><span class="spec" style="font-size:52px; font-weight:400; letter-spacing:-0.03em">Aa</span><span class="spec" style="font-size:40px; font-weight:400; letter-spacing:-0.02em">Display</span><span class="tag">Playfair 400 · --type-display</span></div>
  <div class="row"><span class="spec" style="font-size:34px; font-weight:500">Headline Medium</span><span class="tag">Playfair 500 · --type-h2</span></div>
  <div class="row"><span class="spec" style="font-size:26px; font-weight:700">Headline Bold</span><span class="tag">Playfair 700</span></div>
  <div class="row"><span class="spec" style="font-size:24px; font-weight:400; font-style:italic">Headline italic</span><span class="tag">Playfair 400 italic</span></div>
</body>
</html>
