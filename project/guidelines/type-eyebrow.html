<!-- @dsCard group="Type" viewport="700x140" name="Eyebrow & Labels" subtitle="Spaced caps for overlines, labels & meta" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); padding: 24px 32px; display:flex; gap:46px; align-items:center; flex-wrap:wrap; }
  .item { display:flex; flex-direction:column; gap:8px; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--text-subtle); }
  .eyebrow { font: var(--type-eyebrow); letter-spacing: var(--tracking-widest); text-transform: uppercase; color: var(--text-accent); }
  .label { font: var(--type-label); color: var(--text-body); }
  .over { font-family: var(--font-sans); font-size: 11px; font-weight:600; letter-spacing: var(--tracking-wider); text-transform: uppercase; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="item"><span class="eyebrow">Why Clearframe</span><span class="tag">--type-eyebrow · 0.22em</span></div>
  <div class="item"><span class="over">Toronto &amp; GTA</span><span class="tag">overline · 0.12em</span></div>
  <div class="item"><span class="label">Form label</span><span class="tag">--type-label · 14/500</span></div>
</body>
</html>
