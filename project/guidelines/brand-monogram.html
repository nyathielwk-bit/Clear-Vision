<!-- @dsCard group="Brand" viewport="700x200" name="Monogram & Mark" subtitle="The 'CF' frame monogram" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface); padding: 30px; display:flex; gap: 40px; align-items:center; justify-content:center; }
  .col { display:flex; flex-direction:column; align-items:center; }
  .mono { width: 84px; height: 84px; display:grid; place-items:center; font-family: var(--font-display); font-weight: 500; font-size: 34px; }
  .frame { border: 1.5px solid var(--navy-800); border-radius: var(--radius-md); color: var(--navy-800); }
  .solid { background: var(--navy-800); color: #fff; border-radius: var(--radius-md); }
  .goldframe { border: 1.5px solid var(--gold-500); border-radius: 50%; color: var(--navy-800); }
  .cap { font: var(--type-caption); color: var(--text-muted); text-align:center; margin-top:10px; }
</style>
</head>
<body>
  <div class="col"><div class="mono frame">CF</div><div class="cap">Framed monogram</div></div>
  <div class="col"><div class="mono solid">CF</div><div class="cap">Solid tile</div></div>
  <div class="col"><div class="mono goldframe">CF</div><div class="cap">Gold ring</div></div>
</body>
</html>
